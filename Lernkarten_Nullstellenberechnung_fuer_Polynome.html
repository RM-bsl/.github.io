<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nullstellen Lernkarten - BS+ Mathematik</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React, ReactDOM und Babel für In-Browser Transpilation -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Serif:italic&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .math-font { font-family: 'Noto Serif', serif; font-style: italic; }
        .transition-all { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // SVG-Icons als Komponenten
        const IconTarget = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
        );
        const IconSearch = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        );
        const IconScissors = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-blue-500"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>
        );
        const IconRefresh = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-green-500"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
        );
        const IconBrain = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-purple-500"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .52 8.105 3 3 0 1 0 5.307-2.915"/><path d="M9 14a3 3 0 0 1-3-3"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.52 8.105 3 3 0 1 1-5.307-2.915"/><path d="M15 14a3 3 0 0 0 3-3"/></svg>
        );
        const IconArrow = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-indigo-500 mt-1 shrink-0"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        );
        const IconLightbulb = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A5 5 0 0 0 8 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
        );

        const MathTerm = ({ children }) => (
            <span className="math-font text-lg mx-1">{children}</span>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('decision');

            const methods = [
                {
                    id: 'ausklammern',
                    title: 'Ausklammern (Faktorisieren)',
                    trigger: <span>Jeder Summand enthält mindestens ein <MathTerm>x</MathTerm>.</span>,
                    structure: <MathTerm>f(x) = a<sub>n</sub>x<sup>n</sup> + ... + a<sub>1</sub>x = 0</MathTerm>,
                    steps: [
                        <span>Die kleinste vorkommende Potenz von <MathTerm>x</MathTerm> vor die Klammer ziehen.</span>,
                        <span>Satz vom Nullprodukt anwenden (<MathTerm>x = 0</MathTerm> ist immer eine Lösung).</span>,
                        'Restpolynom (in der Klammer) weiter untersuchen.'
                    ],
                    proTip: <span>Spart die Polynomdivision, wenn kein Absolutglied (<MathTerm>a<sub>0</sub></MathTerm>) vorhanden ist!</span>,
                    icon: <IconScissors />,
                    color: 'bg-blue-50',
                    borderColor: 'border-blue-400',
                    headerColor: 'bg-blue-500'
                },
                {
                    id: 'substitution',
                    title: 'Substitution (Ersetzung)',
                    trigger: <span>Biquadratische Form (nur gerade Potenzen <MathTerm>x<sup>4</sup>, x<sup>2</sup></MathTerm> und <MathTerm>a<sub>0</sub></MathTerm>).</span>,
                    structure: <MathTerm>f(x) = ax<sup>4</sup> + bx<sup>2</sup> + c = 0</MathTerm>,
                    steps: [
                        <span>Substituiere <MathTerm>u = x<sup>2</sup></MathTerm>. Die Gleichung wird zu <MathTerm>au<sup>2</sup> + bu + c = 0</MathTerm>.</span>,
                        <span>Löse die quadratische Gleichung (Mitternachtsformel) nach <MathTerm>u</MathTerm> auf.</span>,
                        <span>Resubstitution: <MathTerm>x = ±√u</MathTerm> für alle positiven <MathTerm>u</MathTerm>.</span>
                    ],
                    proTip: <span>Vergiss nicht: Aus einem negativen <MathTerm>u</MathTerm> folgen keine reellen <MathTerm>x</MathTerm>-Werte!</span>,
                    icon: <IconRefresh />,
                    color: 'bg-green-50',
                    borderColor: 'border-green-400',
                    headerColor: 'bg-green-500'
                },
                {
                    id: 'polynomdivision',
                    title: 'Polynomdivision',
                    trigger: <span>Grad <MathTerm>n ≥ 3</MathTerm> und keine der anderen Methoden greift.</span>,
                    structure: <MathTerm>f(x) = a<sub>n</sub>x<sup>n</sup> + ... + a<sub>0</sub> = 0</MathTerm>,
                    steps: [
                        <span>Eine Nullstelle <MathTerm>x<sub>1</sub></MathTerm> durch Raten (Teiler von <MathTerm>a<sub>0</sub></MathTerm>) finden.</span>,
                        <span>Division durch den Linearfaktor <MathTerm>(x - x<sub>1</sub>)</MathTerm> durchführen.</span>,
                        'Grad des Polynoms wird um 1 reduziert. Wiederholen oder Lösungsformel nutzen.'
                    ],
                    proTip: <span>Denk an den Rhythmus: <strong>Geteilt, Mal, Minus, Herunternehmen!</strong> Setze beim Abziehen der Zeilen unbedingt Klammern, um Vorzeichenfehler zu vermeiden.</span>,
                    icon: <IconBrain />,
                    color: 'bg-purple-50',
                    borderColor: 'border-purple-400',
                    headerColor: 'bg-purple-500'
                }
            ];

            return (
                <div className="p-4 md:p-8 max-w-4xl mx-auto">
                    <header className="mb-8 text-center">
                        <h1 className="text-3xl font-bold text-slate-800 mb-2">Methoden der Nullstellenberechnung</h1>
                        <p className="text-slate-600 font-semibold">BS+ Mathematik | Analysis | Grad 3 & 4</p>
                    </header>

                    <div className="flex flex-wrap justify-center gap-3 mb-8">
                        <button 
                            onClick={() => setActiveTab('decision')}
                            className={`px-5 py-2 rounded-full font-semibold transition-all flex items-center gap-2 ${activeTab === 'decision' ? 'bg-orange-600 text-white shadow-lg scale-105' : 'bg-white text-slate-700 hover:bg-slate-200'}`}
                        >
                            <IconTarget /> Strategie-Guide
                        </button>
                        {methods.map(m => (
                            <button 
                                key={m.id}
                                onClick={() => setActiveTab(m.id)}
                                className={`px-5 py-2 rounded-full font-semibold transition-all ${activeTab === m.id ? 'bg-indigo-600 text-white shadow-lg scale-105' : 'bg-white text-slate-700 hover:bg-slate-200'}`}
                            >
                                {m.title.split(' ')[0]}
                            </button>
                        ))}
                    </div>

                    <div className="transition-all duration-300">
                        {activeTab === 'decision' && (
                            <div className="bg-white border-2 border-orange-200 rounded-2xl shadow-xl overflow-hidden">
                                <div className="bg-orange-600 p-5 text-white flex items-center gap-3 text-xl font-bold">
                                    <IconSearch /> Die Wahl des richtigen Verfahrens
                                </div>
                                <div className="p-6 space-y-10">
                                    <section className="bg-orange-50 p-6 rounded-xl border-l-8 border-orange-400">
                                        <h3 className="text-xl font-bold text-slate-800 mb-3">
                                            Strukturanalyse
                                        </h3>
                                        <p className="text-slate-700 leading-relaxed">
                                            Bevor du mit der Rechnung startest, musst du das "Muster" der Funktion erkennen. Jedes Muster führt dich zu einer anderen Spezialkarte oben.
                                        </p>
                                    </section>

                                    <div className="grid gap-8">
                                        <div className="relative p-6 bg-white border-2 border-slate-100 shadow-md rounded-2xl hover:border-blue-200 transition-colors">
                                            <div className="absolute -top-4 -left-4 bg-blue-500 text-white w-10 h-10 rounded-full flex items-center justify-center font-bold text-lg shadow-lg">1</div>
                                            <h4 className="text-lg font-bold text-blue-600 mb-2 underline underline-offset-4">Muster: Fehlendes Absolutglied</h4>
                                            <p className="text-slate-700 mb-3">
                                                Untersuche den Term auf eine "reine Zahl" am Ende.
                                            </p>
                                            <div className="p-3 bg-blue-50 rounded-lg border border-blue-100 text-sm italic">
                                                "Hat <strong>jeder</strong> einzelne Teil der Gleichung ein <MathTerm>x</MathTerm> bei sich?"
                                            </div>
                                            <p className="mt-4 text-sm font-semibold text-slate-600">
                                                → Falls ja: Nutze die Methode <span className="text-blue-600 font-bold">Ausklammern</span>.
                                            </p>
                                        </div>

                                        <div className="relative p-6 bg-white border-2 border-slate-100 shadow-md rounded-2xl hover:border-green-200 transition-colors">
                                            <div className="absolute -top-4 -left-4 bg-green-500 text-white w-10 h-10 rounded-full flex items-center justify-center font-bold text-lg shadow-lg">2</div>
                                            <h4 className="text-lg font-bold text-green-600 mb-2 underline underline-offset-4">Muster: Biquadratische Form</h4>
                                            <p className="text-slate-700 mb-3">
                                                Untersuche die vorkommenden Exponenten (Hochzahlen).
                                            </p>
                                            <div className="p-3 bg-green-50 rounded-lg border border-green-100 text-sm italic">
                                                "Kommen <strong>nur</strong> gerade Potenzen (<MathTerm>x⁴</MathTerm> und <MathTerm>x²</MathTerm>) sowie eine Zahl vor?"
                                            </div>
                                            <p className="mt-4 text-sm font-semibold text-slate-600">
                                                → Falls ja: Nutze die Methode <span className="text-green-600 font-bold">Substitution</span>.
                                            </p>
                                        </div>

                                        <div className="relative p-6 bg-slate-50 border-2 border-dashed border-slate-300 shadow-sm rounded-2xl">
                                            <div className="absolute -top-4 -left-4 bg-purple-500 text-white w-10 h-10 rounded-full flex items-center justify-center font-bold text-lg shadow-lg">3</div>
                                            <h4 className="text-lg font-bold text-purple-600 mb-2 underline underline-offset-4">Muster: Gemischte hohe Grade</h4>
                                            <p className="text-slate-700 mb-3">
                                                Wird angewendet, wenn keine der einfachen Strukturen vorliegt.
                                            </p>
                                            <div className="p-3 bg-purple-50 rounded-lg border border-purple-100 text-sm italic">
                                                "Gibt es ein Absolutglied <strong>und</strong> ungerade Potenzen wie <MathTerm>x³</MathTerm> oder <MathTerm>x¹</MathTerm>?"
                                            </div>
                                            <p className="mt-4 text-sm font-semibold text-slate-600">
                                                → Falls ja: Nutze die Methode <span className="text-purple-600 font-bold">Polynomdivision</span>.
                                            </p>
                                        </div>
                                    </div>
                                    
                                    <div className="bg-blue-100 p-4 rounded-xl flex items-center gap-3 border border-blue-200">
                                        <div className="bg-blue-500 text-white p-2 rounded-full">
                                            <IconLightbulb />
                                        </div>
                                        <p className="text-blue-900 text-sm font-medium">
                                            <strong>Merksatz:</strong> Scanne den Funktionsterm immer erst nach dem Absolutglied und den Exponenten, bevor du eine Entscheidung triffst.
                                        </p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {methods.map(m => activeTab === m.id && (
                            <div key={m.id} className={`${m.color} border-2 ${m.borderColor} rounded-2xl shadow-xl overflow-hidden`}>
                                <div className={`${m.headerColor} p-4 text-white flex items-center gap-2 text-xl font-bold uppercase tracking-wide`}>
                                    {m.icon} {m.title}
                                </div>
                                <div className="p-6 space-y-6">
                                    <div className="bg-white p-4 rounded-lg border border-slate-200 shadow-sm">
                                        <h4 className="font-bold text-slate-800 flex items-center gap-2 mb-2">
                                            Wann anwenden?
                                        </h4>
                                        <div className="text-slate-700 italic">{m.trigger}</div>
                                    </div>

                                    <div className="bg-slate-800 text-white p-6 rounded-xl text-center shadow-inner">
                                        <div className="text-2xl">{m.structure}</div>
                                    </div>

                                    <div className="space-y-3">
                                        <h4 className="font-bold text-slate-800">Rechenschritte:</h4>
                                        {m.steps.map((step, idx) => (
                                            <div key={idx} className="flex items-start gap-3 text-slate-700 bg-white/50 p-2 rounded">
                                                <IconArrow />
                                                <span>{step}</span>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="p-4 bg-white border-t-4 border-indigo-500 rounded shadow text-sm italic">
                                        <strong>Rechen-Tipp:</strong> {m.proTip}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
