<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nullstellen Lernkarten - BS+ Mathematik</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React, ReactDOM und Babel für In-Browser Transpilation -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif:italic&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .math-font { font-family: 'Noto Serif', serif; font-style: italic; }
        .transition-all { transition: all 0.3s ease; }
        /* Sanftere Schatten für modernen Look */
        .modern-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="bg-[#f8fafc]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // SVG-Icons als Komponenten
        const IconTarget = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
        );
        const IconSearch = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        );
        const IconScissors = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="opacity-80"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>
        );
        const IconRefresh = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="opacity-80"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
        );
        const IconBrain = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="opacity-80"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .52 8.105 3 3 0 1 0 5.307-2.915"/><path d="M9 14a3 3 0 0 1-3-3"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.52 8.105 3 3 0 1 1-5.307-2.915"/><path d="M15 14a3 3 0 0 0 3-3"/></svg>
        );
        const IconArrow = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-slate-400 mt-1 shrink-0"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        );
        const IconLightbulb = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A5 5 0 0 0 8 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
        );

        const MathTerm = ({ children }) => (
            <span className="math-font text-lg mx-0.5">{children}</span>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('decision');

            const methods = [
                {
                    id: 'ausklammern',
                    title: 'Ausklammern (Faktorisieren)',
                    trigger: <span>Jeder Summand enthält mindestens ein <MathTerm>x</MathTerm>.</span>,
                    structure: <MathTerm>f(x) = a<sub>n</sub>x<sup>n</sup> + ... + a<sub>1</sub>x = 0</MathTerm>,
                    steps: [
                        <span>Die kleinste vorkommende Potenz von <MathTerm>x</MathTerm> vor die Klammer ziehen.</span>,
                        <span>Satz vom Nullprodukt anwenden (<MathTerm>x = 0</MathTerm> ist immer eine Lösung).</span>,
                        'Restpolynom (in der Klammer) weiter untersuchen.'
                    ],
                    proTip: <span>Spart die Polynomdivision, wenn kein Absolutglied (<MathTerm>a<sub>0</sub></MathTerm>) vorhanden ist!</span>,
                    icon: <IconScissors />,
                    color: 'bg-white',
                    borderColor: 'border-slate-200',
                    headerColor: 'bg-slate-500',
                    accentColor: 'text-slate-600',
                    badgeColor: 'bg-blue-100 text-blue-700'
                },
                {
                    id: 'substitution',
                    title: 'Substitution (Ersetzung)',
                    trigger: <span>Biquadratische Form (nur gerade Potenzen <MathTerm>x<sup>4</sup>, x<sup>2</sup></MathTerm> und <MathTerm>a<sub>0</sub></MathTerm>).</span>,
                    structure: <MathTerm>f(x) = ax<sup>4</sup> + bx<sup>2</sup> + c = 0</MathTerm>,
                    steps: [
                        <span>Substituiere <MathTerm>u = x<sup>2</sup></MathTerm>. Die Gleichung wird zu <MathTerm>au<sup>2</sup> + bu + c = 0</MathTerm>.</span>,
                        <span>Löse die quadratische Gleichung (Mitternachtsformel) nach <MathTerm>u</MathTerm> auf.</span>,
                        <span>Resubstitution: <MathTerm>x = ±√u</MathTerm> für alle positiven <MathTerm>u</MathTerm>.</span>
                    ],
                    proTip: <span>Vergiss nicht: Aus einem negativen <MathTerm>u</MathTerm> folgen keine reellen <MathTerm>x</MathTerm>-Werte!</span>,
                    icon: <IconRefresh />,
                    color: 'bg-white',
                    borderColor: 'border-slate-200',
                    headerColor: 'bg-emerald-600/70',
                    accentColor: 'text-emerald-700',
                    badgeColor: 'bg-emerald-100 text-emerald-700'
                },
                {
                    id: 'polynomdivision',
                    title: 'Polynomdivision',
                    trigger: <span>Grad <MathTerm>n ≥ 3</MathTerm> und keine der anderen Methoden greift.</span>,
                    structure: <MathTerm>f(x) = a<sub>n</sub>x<sup>n</sup> + ... + a<sub>0</sub> = 0</MathTerm>,
                    steps: [
                        <span>Eine Nullstelle <MathTerm>x<sub>1</sub></MathTerm> durch Raten (Teiler von <MathTerm>a<sub>0</sub></MathTerm>) finden.</span>,
                        <span>Division durch den Linearfaktor <MathTerm>(x - x<sub>1</sub>)</MathTerm> durchführen.</span>,
                        'Grad des Polynoms wird um 1 reduziert. Wiederholen oder Lösungsformel nutzen.'
                    ],
                    proTip: <span>Denk an den Rhythmus: <strong>Geteilt, Mal, Minus, Herunternehmen!</strong> Setze beim Abziehen der Zeilen unbedingt Klammern, um Vorzeichenfehler zu vermeiden.</span>,
                    icon: <IconBrain />,
                    color: 'bg-white',
                    borderColor: 'border-slate-200',
                    headerColor: 'bg-violet-500/70',
                    accentColor: 'text-violet-700',
                    badgeColor: 'bg-violet-100 text-violet-700'
                }
            ];

            return (
                <div className="p-4 md:p-8 max-w-4xl mx-auto text-slate-800">
                    <header className="mb-10 text-center">
                        <h1 className="text-4xl font-bold text-slate-900 mb-3 tracking-tight">Nullstellenberechnung</h1>
                        <p className="text-slate-500 font-medium">Lerninhalte für den Mathematikunterricht an der BS+</p>
                    </header>

                    <nav className="flex flex-wrap justify-center gap-2 mb-10">
                        <button 
                            onClick={() => setActiveTab('decision')}
                            className={`px-6 py-2.5 rounded-xl font-semibold transition-all flex items-center gap-2 border-2 ${activeTab === 'decision' ? 'bg-slate-800 border-slate-800 text-white shadow-md' : 'bg-white border-slate-200 text-slate-600 hover:border-slate-300'}`}
                        >
                            <IconTarget /> Strategie
                        </button>
                        {methods.map(m => (
                            <button 
                                key={m.id}
                                onClick={() => setActiveTab(m.id)}
                                className={`px-6 py-2.5 rounded-xl font-semibold transition-all border-2 ${activeTab === m.id ? 'bg-slate-100 border-slate-400 text-slate-900 shadow-sm' : 'bg-white border-slate-200 text-slate-600 hover:border-slate-300'}`}
                            >
                                {m.title.split(' ')[0]}
                            </button>
                        ))}
                    </nav>

                    <main className="transition-all duration-500">
                        {activeTab === 'decision' && (
                            <div className="bg-white border border-slate-200 rounded-3xl modern-shadow overflow-hidden">
                                <div className="bg-slate-800 p-6 text-white flex items-center gap-3 text-xl font-semibold">
                                    <IconSearch /> Orientierung: Muster erkennen
                                </div>
                                <div className="p-8 space-y-12">
                                    <section className="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                                        <h3 className="text-sm uppercase tracking-widest font-bold text-slate-400 mb-2">
                                            Das Prinzip
                                        </h3>
                                        <p className="text-lg text-slate-700 leading-relaxed">
                                            Bevor du rechnest, scannst du den Funktionsterm. Je nach Aufbau der Gleichung wählst du eines der drei Werkzeuge oben aus.
                                        </p>
                                    </section>

                                    <div className="grid gap-6">
                                        <div className="group p-6 bg-white border border-slate-100 rounded-2xl hover:border-slate-200 hover:bg-slate-50/50 transition-all">
                                            <div className="flex items-center gap-4 mb-4">
                                                <span className="flex items-center justify-center w-8 h-8 rounded-full bg-slate-100 text-slate-500 font-bold">1</span>
                                                <h4 className="text-lg font-bold text-slate-900">Fehlendes Absolutglied</h4>
                                            </div>
                                            <p className="text-slate-600 mb-4 pl-12 italic">
                                                "Hat <strong>jeder</strong> einzelne Teil der Gleichung ein <MathTerm>x</MathTerm> bei sich?"
                                            </p>
                                            <div className="pl-12">
                                                <span className="inline-block px-3 py-1 rounded-full bg-blue-50 text-blue-600 text-xs font-bold uppercase tracking-wider">Werkzeug: Ausklammern</span>
                                            </div>
                                        </div>

                                        <div className="group p-6 bg-white border border-slate-100 rounded-2xl hover:border-slate-200 hover:bg-slate-50/50 transition-all">
                                            <div className="flex items-center gap-4 mb-4">
                                                <span className="flex items-center justify-center w-8 h-8 rounded-full bg-slate-100 text-slate-500 font-bold">2</span>
                                                <h4 className="text-lg font-bold text-slate-900">Biquadratische Form</h4>
                                            </div>
                                            <p className="text-slate-600 mb-4 pl-12 italic">
                                                "Kommen <strong>nur</strong> gerade Potenzen (<MathTerm>x⁴</MathTerm> und <MathTerm>x²</MathTerm>) sowie eine Zahl vor?"
                                            </p>
                                            <div className="pl-12">
                                                <span className="inline-block px-3 py-1 rounded-full bg-emerald-50 text-emerald-600 text-xs font-bold uppercase tracking-wider">Werkzeug: Substitution</span>
                                            </div>
                                        </div>

                                        <div className="group p-6 bg-white border border-slate-100 rounded-2xl hover:border-slate-200 hover:bg-slate-50/50 transition-all">
                                            <div className="flex items-center gap-4 mb-4">
                                                <span className="flex items-center justify-center w-8 h-8 rounded-full bg-slate-100 text-slate-500 font-bold">3</span>
                                                <h4 className="text-lg font-bold text-slate-900">Gemischte hohe Grade</h4>
                                            </div>
                                            <p className="text-slate-600 mb-4 pl-12 italic">
                                                "Gibt es ein Absolutglied <strong>und</strong> ungerade Potenzen wie <MathTerm>x³</MathTerm> oder <MathTerm>x¹</MathTerm>?"
                                            </p>
                                            <div className="pl-12">
                                                <span className="inline-block px-3 py-1 rounded-full bg-violet-50 text-violet-600 text-xs font-bold uppercase tracking-wider">Werkzeug: Polynomdivision</span>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="bg-slate-100 p-5 rounded-2xl flex items-center gap-4 border border-slate-200">
                                        <div className="bg-white text-slate-400 p-2.5 rounded-xl shadow-sm">
                                            <IconLightbulb />
                                        </div>
                                        <p className="text-slate-600 text-sm font-medium leading-tight">
                                            <strong>Merksatz:</strong> Erst das Absolutglied und die Exponenten scannen, dann entscheiden. Das spart Zeit und Rechenaufwand.
                                        </p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {methods.map(m => activeTab === m.id && (
                            <div key={m.id} className={`${m.color} border ${m.borderColor} rounded-3xl modern-shadow overflow-hidden`}>
                                <div className={`${m.headerColor} p-6 text-white flex items-center gap-3 text-xl font-semibold`}>
                                    {m.icon} {m.title}
                                </div>
                                <div className="p-8 space-y-8">
                                    <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                                        <div>
                                            <h4 className="text-xs uppercase tracking-widest font-bold text-slate-400 mb-1">
                                                Bedingung
                                            </h4>
                                            <div className="text-slate-700 text-lg">{m.trigger}</div>
                                        </div>
                                        <div className={`px-4 py-1.5 rounded-lg text-sm font-bold ${m.badgeColor}`}>
                                            Muster-Match
                                        </div>
                                    </div>

                                    <div className="bg-slate-900 text-white p-8 rounded-2xl text-center shadow-lg">
                                        <div className="text-2xl tracking-wide opacity-95">{m.structure}</div>
                                    </div>

                                    <div className="space-y-4">
                                        <h4 className="text-xs uppercase tracking-widest font-bold text-slate-400">
                                            Rechenweg
                                        </h4>
                                        <div className="grid gap-3">
                                            {m.steps.map((step, idx) => (
                                                <div key={idx} className="flex items-start gap-4 bg-slate-50/50 p-4 rounded-xl border border-slate-100">
                                                    <IconArrow />
                                                    <span className="text-slate-700 leading-relaxed">{step}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className={`p-5 rounded-2xl border ${m.borderColor} bg-slate-50/30 text-sm`}>
                                        <div className="flex items-center gap-2 mb-2 font-bold uppercase tracking-tight text-slate-400">
                                            <IconLightbulb /> Rechen-Tipp
                                        </div>
                                        <div className="text-slate-600 leading-relaxed">{m.proTip}</div>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </main>

                    <footer className="mt-16 text-center">
                        <div className="inline-block px-4 py-1.5 bg-white border border-slate-100 rounded-full text-[10px] uppercase tracking-widest font-bold text-slate-300">
                            Mathematische Lernressource • BS+ Bayern • Analysis
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
