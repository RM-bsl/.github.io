<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nullstellen-Navigator: Polynomdivision</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel für In-Browser JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif:italic&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #fcfdfe; color: #334155; }
        .math-font { font-family: 'Noto Serif', serif; font-style: italic; }
        .mono-font { font-family: 'Fira Code', monospace; }
        
        .step-card { 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        .step-card:hover:not(.active) {
            transform: translateY(-4px);
            border-color: #cbd5e1;
            background-color: #ffffff;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
        }

        .active {
            transform: scale(1.01);
            box-shadow: 0 10px 30px -10px rgba(99, 102, 241, 0.1);
        }

        .pulse-indicator {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modern-shadow { box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const MathTerm = ({ children }) => (
            <span className="math-font text-[1.1em] text-slate-900">{children}</span>
        );

        const Graph = ({ showZeros = false }) => {
            const points = [];
            for (let x = -2.6; x <= 1.8; x += 0.05) {
                const y = Math.pow(x, 3) - 3 * x + 2;
                const px = (x + 3) * 70; 
                const py = 140 - y * 25; 
                if (py > 10 && py < 190) points.push(`${px},${py}`);
            }

            return (
                <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm mb-8">
                    <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 text-center md:text-left">
                        {showZeros ? "Analyse-Ergebnis: Schnitt- und Berührstelle" : "Ausgangslage: Der Funktionsgraph"}
                    </h3>
                    <div className="text-center mb-4">
                        <span className="px-3 py-1 bg-slate-50 rounded-full text-[10px] font-bold text-slate-400 border border-slate-100">
                            Untersuchte Funktion: <MathTerm>f(x) = x³ - 3x + 2</MathTerm>
                        </span>
                    </div>
                    <div className="flex justify-center">
                        <svg viewBox="0 0 400 200" className="w-full max-w-xl h-auto overflow-visible">
                            <line x1="20" y1="140" x2="380" y2="140" stroke="#cbd5e1" strokeWidth="1.5" />
                            <line x1="210" y1="20" x2="210" y2="190" stroke="#cbd5e1" strokeWidth="1.5" />
                            <polyline points="375,135 380,140 375,145" fill="none" stroke="#cbd5e1" strokeWidth="1.5" />
                            <polyline points="205,25 210,20 215,25" fill="none" stroke="#cbd5e1" strokeWidth="1.5" />
                            <text x="385" y="145" fontSize="12" fill="#94a3b8" className="math-font">x</text>
                            <text x="190" y="25" fontSize="12" fill="#94a3b8" className="math-font">f(x)</text>
                            <polyline points={points.join(' ')} fill="none" stroke="#6366f1" strokeWidth="2.5" strokeLinecap="round" />
                            {showZeros && (
                                <g>
                                    <circle cx="70" cy="140" r="5" fill="#f43f5e" />
                                    <circle cx="280" cy="140" r="5" fill="#f43f5e" />
                                    <text x="55" y="160" fontSize="12" fill="#f43f5e" fontWeight="bold">x = -2</text>
                                    <text x="275" y="160" fontSize="12" fill="#f43f5e" fontWeight="bold">x = 1</text>
                                    <path d="M260,120 Q280,110 300,120" fill="none" stroke="#f43f5e" strokeWidth="1" strokeDasharray="4" />
                                </g>
                            )}
                        </svg>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeStep, setActiveStep] = useState(0);

            const steps = [
                {
                    title: "1. Die Glückszahl",
                    header: "Nullstelle durch Raten finden",
                    content: "Suche durch Probieren eine erste Zahl, für die f(x) = 0 ergibt. Orientiere dich dabei an den Teilern des Absolutglieds (hier die 2).",
                    formula: "f(1) = 1³ - 3·1 + 2 = 0",
                    merksatz: "Rate klug and probier' die Eins – oft ist sie die Lösung deines Seins!",
                    color: "bg-indigo-50/50 border-indigo-100"
                },
                {
                    title: "2. Der Linearfaktor",
                    header: "Den Teiler konstruieren",
                    content: "Bilde aus deiner gefundenen Nullstelle den Teiler (Linearfaktor). Achtung: Das Vorzeichen dreht sich um!",
                    formula: "x₁ = 1 \u2192 Teiler: (x - 1)",
                    merksatz: "Ist die Nullstelle positiv und fein, muss im Teiler ein Minus sein.",
                    color: "bg-emerald-50/50 border-emerald-100"
                },
                {
                    title: "3. Die Durchführung",
                    header: "Schriftliche Division",
                    content: "Hier führen wir die Division schrittweise durch. Wir nutzen den Platzhalter 0x², damit wir keine Spalte überspringen und Vorzeichenfehler vermeiden.",
                    formula: "(x³ + 0x² - 3x + 2) : (x - 1) = x² + x - 2",
                    merksatz: "Geteilt, Mal, Minus, Herunternehmen. Nutze Klammern!",
                    isDetailed: true,
                    color: "bg-amber-50/50 border-amber-100"
                },
                {
                    title: "4. Das Finale",
                    header: "Restpolynom lösen",
                    content: "Das Ergebnis der Division ist ein Grad niedriger (quadratisch). Löse dieses Restpolynom nun mit der Mitternachtsformel.",
                    formula: "x² + x - 2 = 0 \u2192 x\u2082 = 1, x\u2083 = -2",
                    merksatz: "Die Mitternachtsformel macht den Rest – das ist der finale Nullstellen-Test!",
                    color: "bg-rose-50/50 border-rose-100"
                }
            ];

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-12">
                    <header className="mb-10 text-center">
                        <span className="text-[10px] font-bold text-indigo-400 uppercase tracking-[0.2em] block mb-2">Mathematik didaktisch</span>
                        <h1 className="text-3xl md:text-4xl font-bold text-slate-800 mb-4 tracking-tight">Polynomdivision bei Grad 3</h1>

                        <div className="max-w-2xl mx-auto bg-white p-6 rounded-3xl border border-slate-100 shadow-sm text-left mb-8">
                            <div className="flex gap-4 items-start">
                                <div className="p-3 bg-indigo-50 rounded-2xl text-indigo-500 shrink-0">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                                </div>
                                <div className="space-y-3 text-sm text-slate-600 italic">
                                    <p className="font-bold text-slate-800 uppercase tracking-tight text-xs not-italic">Anleitung zur Interaktion</p>
                                    Wähle unten einen Kasten aus. In Schritt 3 findest du die komplette Rechnung und Ablaufschemata.
                                </div>
                            </div>
                        </div>
                    </header>

                    <Graph showZeros={false} />

                    <div className="space-y-6 mb-12">
                        {steps.map((step, idx) => {
                            const isActive = activeStep === idx;
                            return (
                                <div 
                                    key={idx}
                                    onClick={() => setActiveStep(idx)}
                                    className={`step-card relative p-6 rounded-3xl border cursor-pointer ${isActive ? step.color + ' active border-opacity-100 shadow-lg' : 'bg-white border-slate-100 opacity-70 hover:opacity-100'}`}
                                >
                                    {!isActive && (
                                        <div className="absolute top-4 right-4 flex items-center gap-2 text-[10px] font-bold text-slate-400 bg-slate-50 px-2 py-1 rounded-full border border-slate-100">
                                            <span>Details anzeigen</span>
                                        </div>
                                    )}

                                    <div className="flex items-center gap-4 mb-2">
                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold transition-colors ${isActive ? 'bg-slate-800 text-white shadow-sm' : 'bg-slate-100 text-slate-400'}`}>
                                            {idx + 1}
                                        </div>
                                        <h2 className="font-bold text-slate-800 text-lg">{step.title}</h2>
                                    </div>

                                    <h3 className="text-xs font-semibold text-slate-400 uppercase mb-4 tracking-wider pl-12">{step.header}</h3>

                                    <div className={`grid gap-6 md:pl-12 transition-all duration-500 ${isActive ? 'max-h-[6000px] opacity-100' : 'max-h-0 opacity-0 overflow-hidden'}`}>
                                        <div className="space-y-6">
                                            <p className="text-sm text-slate-600 leading-relaxed">
                                                {step.content}
                                            </p>

                                            {isActive && idx === 2 && (
                                                <div className="bg-slate-900 text-slate-300 p-4 md:p-8 rounded-3xl mono-font text-[12px] md:text-[13px] leading-relaxed overflow-x-auto shadow-2xl border border-slate-700">
                                                    <div className="mb-10 pb-4 border-b border-slate-700 flex justify-between items-center">
                                                        <span className="text-indigo-400 font-bold tracking-widest text-[11px] uppercase">Schriftliche Durchführung & Ablaufschema</span>
                                                        <div className="flex gap-4 text-[9px] uppercase font-bold">
                                                            <span className="text-blue-400">● Geteilt</span>
                                                            <span className="text-emerald-400">● Mal</span>
                                                            <span className="text-rose-400">● Minus</span>
                                                            <span className="text-amber-400">● Runter</span>
                                                        </div>
                                                    </div>

                                                    <div className="space-y-20">
                                                        {/* LAUF 1 */}
                                                        <div className="relative">
                                                            <div className="flex items-center gap-3 mb-6">
                                                                <span className="bg-blue-500/20 text-blue-400 text-[10px] px-3 py-1 rounded-lg font-bold border border-blue-500/30 uppercase tracking-tighter">Lauf 1: Die x²-Stelle</span>
                                                            </div>
                                                            <div className="flex flex-col lg:flex-row gap-10">
                                                                <div className="flex-1 bg-black/30 p-6 rounded-2xl border border-white/5 shadow-inner">
                                                                    <div className="mb-2 flex items-center gap-1 text-lg">
                                                                        (<span className="text-blue-400 font-bold underline underline-offset-4">x³</span> + 0x² - 3x + 2) : (<span className="text-blue-400 font-bold">x</span> - 1) = <span className="text-blue-400 font-bold bg-blue-400/20 px-2 rounded">x²</span>
                                                                    </div>
                                                                    <div className="text-emerald-400 text-lg">
                                                                        <span className="text-rose-400 font-bold">-</span>(<span className="text-emerald-400">x³ - 1x²</span>)
                                                                    </div>
                                                                    <div className="text-slate-600">-----------</div>
                                                                    <div className="text-amber-400 mt-2 text-lg">
                                                                        <span className="ml-6 text-white font-bold">x²</span> <span className="underline decoration-amber-500/50">- 3x</span>
                                                                    </div>
                                                                </div>
                                                                <div className="lg:w-80 space-y-3 bg-slate-800/40 p-5 rounded-2xl border border-slate-700/50">
                                                                    <div className="text-[10px] uppercase font-black text-slate-500 border-b border-slate-700 pb-2 mb-3 tracking-widest">Mathematischer Ablauf 1</div>
                                                                    <div className="space-y-4">
                                                                        <div>
                                                                            <span className="text-blue-400 font-bold text-[11px] block">1. DIVISION (Geteilt)</span>
                                                                            <p className="text-white text-[11px] mt-1">Teile den vordersten Term <MathTerm><span className="text-white">x³</span></MathTerm> durch <MathTerm><span className="text-white">x</span></MathTerm>. Ergebnis <MathTerm><span className="text-blue-400">x²</span></MathTerm> hinten notieren.</p>
                                                                        </div>
                                                                        <div>
                                                                            <span className="text-emerald-400 font-bold text-[11px] block">2. MULTIPLIKATION (Mal)</span>
                                                                            <p className="text-slate-400 text-[11px] mt-1">Multipliziere das Ergebnis <MathTerm><span className="text-white">x²</span></MathTerm> mit dem gesamten Teiler <MathTerm><span className="text-white">(x-1)</span></MathTerm>.</p>
                                                                        </div>
                                                                        <div>
                                                                            <span className="text-rose-400 font-bold text-[11px] block">3. SUBTRAKTION (Minus)</span>
                                                                            <p className="text-slate-400 text-[11px] mt-1">Ziehe das Produkt ab. <span className="text-rose-300 italic underline decoration-rose-500/30">Vorsicht: 0 - (-1) wird zu +1.</span></p>
                                                                        </div>
                                                                        <div>
                                                                            <span className="text-amber-400 font-bold text-[11px] block">4. ÜBERTRAG (Runter)</span>
                                                                            <p className="text-slate-400 text-[11px] mt-1">Zieh die <MathTerm><span className="text-white">-3x</span></MathTerm> für den nächsten Lauf nach unten.</p>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>

                                                        {/* LAUF 2 */}
                                                        <div className="relative">
                                                            <div className="flex items-center gap-3 mb-6">
                                                                <span className="bg-emerald-500/20 text-emerald-400 text-[10px] px-3 py-1 rounded-lg font-bold border border-emerald-500/30 uppercase tracking-tighter">Lauf 2: Die x-Stelle</span>
                                                            </div>
                                                            <div className="flex flex-col lg:flex-row gap-10">
                                                                <div className="flex-1 bg-black/30 p-6 rounded-2xl border border-white/5 shadow-inner">
                                                                    <div className="ml-6 mb-2 flex items-center gap-1 text-lg">
                                                                        (<span className="text-blue-400 font-bold underline underline-offset-4">x²</span> - 3x) : (<span className="text-blue-400 font-bold">x</span> - 1) = ... <span className="text-blue-400 font-bold bg-blue-400/20 px-2 rounded">+x</span>
                                                                    </div>
                                                                    <div className="ml-4 text-emerald-400 mb-2 text-lg">
                                                                        <span className="text-rose-400 font-bold">-</span>(<span className="text-emerald-400">x² - 1x</span>)
                                                                    </div>
                                                                    <div className="ml-4 text-slate-600">----------</div>
                                                                    <div className="ml-10 text-amber-400 mt-2 text-lg text-white font-bold">
                                                                        -2x <span className="underline decoration-amber-500/50">+ 2</span>
                                                                    </div>
                                                                </div>
                                                                <div className="lg:w-80 space-y-3 bg-slate-800/40 p-5 rounded-2xl border border-slate-700/50">
                                                                    <div className="text-[10px] uppercase font-black text-slate-500 border-b border-slate-700 pb-2 mb-3 tracking-widest">Mathematischer Ablauf 2</div>
                                                                    <div className="space-y-4">
                                                                        <div>
                                                                            <span className="text-blue-400 font-bold text-[11px] block">1. DIVISION (Geteilt)</span>
                                                                            <p className="text-white text-[11px] mt-1">Teile den Rest <MathTerm><span className="text-white">x²</span></MathTerm> durch <MathTerm><span className="text-white">x</span></MathTerm>. Ergänze das Ergebnis <MathTerm><span className="text-blue-400">+x</span></MathTerm> oben.</p>
                                                                        </div>
                                                                        <div>
                                                                            <span className="text-emerald-400 font-bold text-[11px] block">2. MULTIPLIKATION (Mal)</span>
                                                                            <p className="text-slate-400 text-[11px] mt-1">Multipliziere <MathTerm><span className="text-white">x</span></MathTerm> mit <MathTerm><span className="text-white">(x-1)</span></MathTerm>.</p>
                                                                        </div>
                                                                        <div>
                                                                            <span className="text-rose-400 font-bold text-[11px] block">3. SUBTRAKTION (Minus)</span>
                                                                            <p className="text-slate-400 text-[11px] mt-1">Subtrahiere: <MathTerm><span className="text-white">-3x - (-1x) = -2x</span></MathTerm>.</p>
                                                                        </div>
                                                                        <div>
                                                                            <span className="text-amber-400 font-bold text-[11px] block">4. ÜBERTRAG (Runter)</span>
                                                                            <p className="text-slate-400 text-[11px] mt-1">Zieh die <MathTerm><span className="text-white">+2</span></MathTerm> für den letzten Lauf nach unten.</p>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>

                                                        {/* LAUF 3 */}
                                                        <div className="relative">
                                                            <div className="flex items-center gap-3 mb-6">
                                                                <span className="bg-rose-500/20 text-rose-400 text-[10px] px-3 py-1 rounded-lg font-bold border border-rose-500/30 uppercase tracking-tighter">Lauf 3: Das Finale</span>
                                                            </div>
                                                            <div className="flex flex-col lg:flex-row gap-10">
                                                                <div className="flex-1 bg-black/30 p-6 rounded-2xl border border-white/5 shadow-inner">
                                                                    <div className="ml-10 mb-2 flex items-center gap-1 text-lg">
                                                                        (<span className="text-blue-400 font-bold underline underline-offset-4">-2x</span> + 2) : (<span className="text-blue-400 font-bold">x</span> - 1) = ... <span className="text-blue-400 font-bold bg-blue-400/20 px-2 rounded">-2</span>
                                                                    </div>
                                                                    <div className="ml-8 text-emerald-400 mb-2 text-lg">
                                                                        <span className="text-rose-400 font-bold">-</span>(<span className="text-emerald-400">-2x + 2</span>)
                                                                    </div>
                                                                    <div className="ml-8 text-slate-600">----------</div>
                                                                    <div className="ml-16 text-emerald-400 font-bold text-3xl drop-shadow-[0_0_15px_rgba(52,211,153,0.4)]">0</div>
                                                                </div>
                                                                <div className="lg:w-80 space-y-3 bg-slate-800/40 p-5 rounded-2xl border border-slate-700/50">
                                                                    <div className="text-[10px] uppercase font-black text-slate-500 border-b border-slate-700 pb-2 mb-3 tracking-widest">Mathematischer Ablauf 3</div>
                                                                    <div className="space-y-4">
                                                                        <div>
                                                                            <span className="text-blue-400 font-bold text-[11px] block">1. DIVISION (Geteilt)</span>
                                                                            <p className="text-white text-[11px] mt-1">Teile <MathTerm><span className="text-white">-2x</span></MathTerm> durch <MathTerm><span className="text-white">x</span></MathTerm>. Ergänze <MathTerm><span className="text-blue-400">-2</span></MathTerm> im Ergebnis.</p>
                                                                        </div>
                                                                        <div>
                                                                            <span className="text-emerald-400 font-bold text-[11px] block">2. MULTIPLIKATION (Mal)</span>
                                                                            <p className="text-slate-400 text-[11px] mt-1">Multipliziere <MathTerm><span className="text-white">-2</span></MathTerm> mit <MathTerm><span className="text-white">(x-1)</span></MathTerm>.</p>
                                                                        </div>
                                                                        <div>
                                                                            <span className="text-rose-400 font-bold text-[11px] block">3. SUBTRAKTION (Minus)</span>
                                                                            <p className="text-slate-400 text-[11px] mt-1">Das Ergebnis ist exakt Null. Die Rechnung geht auf.</p>
                                                                        </div>
                                                                        <div>
                                                                            <span className="text-emerald-400 font-bold text-[11px] block italic underline">ERGEBNIS</span>
                                                                            <p className="text-white text-[11px] mt-1 font-bold">Division beendet. Rest Null.</p>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="mt-16 pt-8 border-t border-slate-700 text-center">
                                                        <span className="text-slate-500 uppercase text-[11px] font-bold block mb-2 tracking-[0.3em]">Komplettes Ergebnis</span>
                                                        <span className="text-emerald-400 text-3xl font-bold bg-emerald-400/5 px-6 py-2 rounded-2xl border border-emerald-400/20 shadow-lg">x² + x - 2</span>
                                                    </div>
                                                </div>
                                            )}

                                            <div className="bg-white/60 p-4 rounded-2xl border border-slate-100 flex items-center justify-center text-center shadow-sm">
                                                <MathTerm>{step.formula}</MathTerm>
                                            </div>
                                        </div>
                                    </div>

                                    {isActive && (
                                        <div className="mt-6 flex items-center gap-3 p-3 bg-white/40 rounded-xl italic text-xs text-slate-500 border border-white/50 md:ml-12 animate-pulse">
                                            <span className="text-indigo-400 font-bold">● Memo:</span> {step.merksatz}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>

                    <section className="bg-slate-900 p-8 rounded-[2.5rem] text-white shadow-xl relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-32 h-32 bg-indigo-500/10 rounded-full -mr-16 -mt-16 blur-2xl"></div>
                        <h2 className="text-xl font-bold mb-6 flex items-center gap-2">
                            <span className="w-2 h-2 bg-rose-400 rounded-full"></span>
                            Befund: Vielfachheit & Graphverlauf
                        </h2>

                        <div className="grid md:grid-cols-2 gap-10 items-center">
                            <div className="space-y-6">
                                <div className="space-y-3">
                                    <div className="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/10">
                                        <MathTerm><span className="text-white">x = -2</span></MathTerm>
                                        <span className="text-[10px] font-bold px-3 py-1 bg-indigo-500/20 text-indigo-300 rounded-full border border-indigo-500/30 uppercase">Vielfachheit 1</span>
                                    </div>
                                    <div className="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/10">
                                        <MathTerm><span className="text-white">x = 1</span></MathTerm>
                                        <span className="text-[10px] font-bold px-3 py-1 bg-rose-500/20 text-rose-300 rounded-full border border-rose-500/30 uppercase">Vielfachheit 2</span>
                                    </div>
                                </div>

                                <div className="p-5 bg-indigo-500/5 rounded-2xl border border-indigo-500/10 text-xs leading-relaxed italic text-indigo-100/70">
                                    Da die Nullstelle <MathTerm><span className="text-white">x=1</span></MathTerm> sowohl beim Raten als auch bei der Mitternachtsformel auftaucht, ist sie doppelt. Der Graph <strong>berührt</strong> die x-Achse hier nur.
                                </div>
                            </div>
                            <Graph showZeros={true} />
                        </div>
                    </section>

                    <footer className="mt-12 text-center text-[10px] font-bold text-slate-300 uppercase tracking-[0.3em]">
                        Mathematik • BS+ Bayern • Polynomdivision Grad 3
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
