<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schritt-für-Schritt: Ausklammern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Serif:italic&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .math-font { font-family: 'Noto Serif', serif; font-style: italic; }
        .step-card { transition: transform 0.2s ease-in-out; }
        .step-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Hilfskomponente für mathematische Begriffe
        const MathTerm = ({ children }) => (
            <span className="math-font text-[1.1em]">{children}</span>
        );

        const Graph = ({ showZeros = false }) => {
            // Skalierung für SVG
            const points = [];
            for (let x = -0.8; x <= 5.8; x += 0.1) {
                const y = Math.pow(x, 3) - 6 * Math.pow(x, 2) + 5 * x;
                const px = (x + 1) * 50 + 20; 
                const py = 120 - y * 6; 
                points.push(`${px},${py}`);
            }

            return (
                <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm mb-8">
                    <h3 className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">
                        {showZeros ? "Ergebnis-Check: Nullstellen im Graphen" : "Visualisierung: Der Funktionsgraph"}
                    </h3>
                    <div className="flex flex-col md:flex-row gap-8 items-center">
                        <div className="w-full">
                            <svg viewBox="0 0 350 200" className="w-full h-auto overflow-visible">
                                {/* Achsen */}
                                <line x1="10" y1="120" x2="340" y2="120" stroke="#94a3b8" strokeWidth="1" />
                                <line x1="70" y1="10" x2="70" y2="190" stroke="#94a3b8" strokeWidth="1" />
                                
                                {/* Pfeile */}
                                <polyline points="335,115 340,120 335,125" fill="none" stroke="#94a3b8" strokeWidth="1" />
                                <polyline points="65,15 70,10 75,15" fill="none" stroke="#94a3b8" strokeWidth="1" />
                                
                                {/* Beschriftung */}
                                <text x="340" y="135" fontSize="12" fill="#64748b" className="math-font">x</text>
                                <text x="50" y="15" fontSize="12" fill="#64748b" className="math-font">f(x)</text>
                                
                                {/* Graph */}
                                <polyline points={points.join(' ')} fill="none" stroke="#3b82f6" strokeWidth="2" strokeLinejoin="round" />
                                
                                {/* Nullstellen Markierungen (nur wenn showZeros true ist) */}
                                {showZeros && (
                                    <g>
                                        <circle cx="70" cy="120" r="4" fill="#ef4444" /> {/* x=0 */}
                                        <circle cx="120" cy="120" r="4" fill="#ef4444" /> {/* x=1 */}
                                        <circle cx="320" cy="120" r="4" fill="#ef4444" /> {/* x=5 */}
                                        
                                        <text x="65" y="140" fontSize="11" fill="#ef4444" fontWeight="bold">0</text>
                                        <text x="115" y="140" fontSize="11" fill="#ef4444" fontWeight="bold">1</text>
                                        <text x="315" y="140" fontSize="11" fill="#ef4444" fontWeight="bold">5</text>
                                    </g>
                                )}
                            </svg>
                            <p className="text-center text-xs text-slate-400 mt-4 italic">
                                {showZeros ? "Graph mit markierten Nullstellen" : "Graph ohne markierte Nullstellen (Ausgangslage)"}
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeStep, setActiveStep] = useState(0);

            const steps = [
                {
                    title: "1. Die Struktur-Analyse",
                    header: "Blick auf das Absolutglied",
                    content: "Prüfe, ob die Funktion eine 'Zahl ohne x' am Ende hat. Wenn jeder Summand mindestens ein x enthält (also kein Absolutglied vorhanden ist), darfst du ausklammern.",
                    formula: "f(x) = x³ - 6x² + 5x",
                    merksatz: "Keine Zahl ohne x? Dann ist Ausklammern dein bester Komplex!",
                    color: "bg-blue-50 border-blue-200"
                },
                {
                    title: "2. Den Teiler isolieren",
                    header: "Die kleinste Potenz vor die Klammer",
                    content: "Identifiziere die kleinste vorkommende Potenz von x. Ziehe sie als Faktor vor eine Klammer. Dividiere jeden Term in der Funktion durch dieses x.",
                    formula: "x · (x² - 6x + 5) = 0",
                    merksatz: "Nimm das kleinste x vor die Tür – der Rest bleibt drinnen, wir folgen der Spur.",
                    color: "bg-indigo-50 border-indigo-200"
                },
                {
                    title: "3. Das Nullprodukt nutzen",
                    header: "Die erste Lösung fixieren",
                    content: "Ein Produkt wird Null, wenn einer seiner Teile Null ist. Da das ausgeklammerte x ein eigener Faktor ist, muss x = 0 eine Lösung sein.",
                    formula: "x₁ = 0",
                    merksatz: "Ist ein Teil Null, ist alles Null – x = 0 ist dein erster Erfolg!",
                    color: "bg-emerald-50 border-emerald-200"
                },
                {
                    title: "4. Die Rest-Gleichung lösen",
                    header: "Die Klammer knacken",
                    content: "Betrachte nun den Term innerhalb der Klammer. Dieser ist nun nur noch 2. Grades (quadratisch) und kann einfach mit der Mitternachtsformel gelöst werden.",
                    formula: "x² - 6x + 5 = 0 \u2192 x₂ = 1, x₃ = 5",
                    merksatz: "Was in der Klammer bleibt, ist nun bereit – quadratisch gelöst zur rechten Zeit.",
                    color: "bg-amber-50 border-amber-200"
                }
            ];

            return (
                <div className="max-w-4xl mx-auto p-6 md:p-12">
                    <header className="mb-12 text-center">
                        <h1 className="text-3xl font-bold text-slate-800 mb-2 uppercase tracking-tight">Nullstellen finden durch Ausklammern</h1>
                        <p className="text-slate-500 font-medium italic">Didaktischer Leitfaden für die BS+</p>
                    </header>

                    {/* Start-Graph ohne Nullstellen */}
                    <Graph showZeros={false} />

                    <div className="grid gap-6 mb-12">
                        {steps.map((step, idx) => (
                            <div 
                                key={idx}
                                onClick={() => setActiveStep(idx)}
                                className={`p-6 rounded-2xl border-2 transition-all cursor-pointer step-card ${activeStep === idx ? step.color + ' shadow-sm' : 'bg-white border-slate-100 opacity-60'}`}
                            >
                                <div className="flex items-start justify-between mb-4">
                                    <h2 className="text-xl font-bold text-slate-800">{step.title}</h2>
                                    <span className="text-xs font-bold uppercase tracking-widest text-slate-400">Schritt {idx + 1}</span>
                                </div>
                                
                                <h3 className="text-sm font-semibold text-slate-600 mb-3 uppercase tracking-wide">{step.header}</h3>
                                <p className="text-slate-700 leading-relaxed mb-4">{step.content}</p>
                                
                                <div className="bg-white/80 p-4 rounded-xl border border-slate-200 mb-4 text-center">
                                    <span className="math-font text-xl text-slate-900">{step.formula}</span>
                                </div>

                                <div className="flex items-center gap-3 p-3 bg-white rounded-lg border border-slate-100 italic text-sm text-slate-600">
                                    <div className="w-2 h-2 rounded-full bg-slate-300"></div>
                                    <strong>Memo:</strong> {step.merksatz}
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Zusammenfassung und Vielfachheiten am Ende */}
                    <section className="bg-white p-8 rounded-3xl border-2 border-slate-800 shadow-xl overflow-hidden relative">
                        <div className="absolute top-0 right-0 p-4 opacity-10">
                            <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                        </div>
                        
                        <h2 className="text-2xl font-bold text-slate-900 mb-6 flex items-center gap-2">
                            Finaler Check & Vielfachheiten
                        </h2>

                        <div className="grid md:grid-cols-2 gap-8 items-start">
                            <div className="space-y-6">
                                <div className="p-5 bg-slate-50 rounded-2xl border border-slate-100">
                                    <h4 className="font-bold text-slate-700 mb-3 border-b border-slate-200 pb-2">Berechnete Nullstellen</h4>
                                    <ul className="space-y-3">
                                        <li className="flex justify-between items-center bg-white p-3 rounded-xl shadow-sm">
                                            <MathTerm>x₁ = 0</MathTerm>
                                            <span className="text-xs font-bold px-3 py-1 bg-blue-100 text-blue-700 rounded-full">Vielfachheit 1</span>
                                        </li>
                                        <li className="flex justify-between items-center bg-white p-3 rounded-xl shadow-sm">
                                            <MathTerm>x₂ = 1</MathTerm>
                                            <span className="text-xs font-bold px-3 py-1 bg-blue-100 text-blue-700 rounded-full">Vielfachheit 1</span>
                                        </li>
                                        <li className="flex justify-between items-center bg-white p-3 rounded-xl shadow-sm">
                                            <MathTerm>x₃ = 5</MathTerm>
                                            <span className="text-xs font-bold px-3 py-1 bg-blue-100 text-blue-700 rounded-full">Vielfachheit 1</span>
                                        </li>
                                    </ul>
                                </div>

                                <div className="p-5 bg-amber-50 rounded-2xl border border-amber-100">
                                    <h4 className="font-bold text-amber-800 mb-2">Didaktische Einordnung</h4>
                                    <p className="text-amber-700 text-sm leading-relaxed">
                                        Da alle Nullstellen die <strong>Vielfachheit 1</strong> besitzen (ungerade), zeigt der Graph an jeder Stelle einen <strong>Vorzeichenwechsel</strong>. Er schneidet die x-Achse also an allen drei Punkten glatt durch.
                                    </p>
                                </div>
                            </div>

                            <div className="space-y-4">
                                <Graph showZeros={true} />
                            </div>
                        </div>
                    </section>

                    <footer className="mt-12 pt-8 border-t border-slate-200 text-center text-slate-400 text-xs">
                        Mathematik-Modul BS+ | Fokus: Strukturanalyse & Algorithmik
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
