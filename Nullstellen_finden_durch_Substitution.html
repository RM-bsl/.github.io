<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schritt-für-Schritt: Substitution (Grad 4)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif:italic&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fcfdfe; color: #334155; }
        .math-font { font-family: 'Noto Serif', serif; font-style: italic; }
        .step-card { transition: all 0.3s ease; }
        .modern-shadow { box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Globale Hilfskomponente für mathematische Begriffe
        const MathTerm = ({ children }) => (
            <span className="math-font text-[1.1em] text-slate-900">{children}</span>
        );

        const Graph = ({ showZeros = false }) => {
            // Skalierung für SVG
            // f(x) = x^4 - 2x^2 + 1
            const points = [];
            for (let x = -1.6; x <= 1.6; x += 0.05) {
                const y = Math.pow(x, 4) - 2 * Math.pow(x, 2) + 1;
                const px = (x + 2) * 100 - 25; 
                const py = 160 - y * 40; 
                if (py > 10 && py < 190) points.push(`${px},${py}`);
            }

            return (
                <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm mb-8">
                    <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">
                        {showZeros ? "Analyse-Ergebnis: Die doppelten Nullstellen" : "Ausgangslage: Der Funktionsgraph"}
                    </h3>
                    <div className="flex justify-center">
                        <svg viewBox="0 0 400 200" className="w-full max-w-xl h-auto overflow-visible">
                            {/* Achsen */}
                            <line x1="20" y1="160" x2="380" y2="160" stroke="#cbd5e1" strokeWidth="1.5" />
                            <line x1="175" y1="20" x2="175" y2="190" stroke="#cbd5e1" strokeWidth="1.5" />
                            
                            {/* Pfeile */}
                            <polyline points="375,155 380,160 375,165" fill="none" stroke="#cbd5e1" strokeWidth="1.5" />
                            <polyline points="170,25 175,20 180,25" fill="none" stroke="#cbd5e1" strokeWidth="1.5" />

                            {/* Beschriftung */}
                            <text x="385" y="165" fontSize="12" fill="#94a3b8" className="math-font">x</text>
                            <text x="155" y="25" fontSize="12" fill="#94a3b8" className="math-font">f(x)</text>
                            
                            {/* Graph */}
                            <polyline points={points.join(' ')} fill="none" stroke="#6366f1" strokeWidth="2.5" strokeLinecap="round" />
                            
                            {showZeros && (
                                <g>
                                    <circle cx="75" cy="160" r="5" fill="#f43f5e" /> {/* x=-1 */}
                                    <circle cx="275" cy="160" r="5" fill="#f43f5e" /> {/* x=1 */}
                                    <text x="60" y="180" fontSize="12" fill="#f43f5e" fontWeight="bold">x = -1</text>
                                    <text x="270" y="180" fontSize="12" fill="#f43f5e" fontWeight="bold">x = 1</text>
                                </g>
                            )}
                        </svg>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeStep, setActiveStep] = useState(0);

            const steps = [
                {
                    title: "1. Die Struktur-Analyse",
                    header: "Prüfung auf biquadratische Form",
                    content: "Suche nach dem Muster x⁴ und x². Es dürfen keine ungeraden Exponenten (x³ oder x¹) vorkommen. Ein Absolutglied (Zahl ohne x) am Ende ist erlaubt.",
                    formula: "f(x) = x⁴ - 2x² + 1",
                    merksatz: "Sind die Hochzahlen 4, 2 und leer? Die Substitution hilft dir sehr!",
                    color: "bg-indigo-50/50 border-indigo-100"
                },
                {
                    title: "2. Der Tausch-Trick",
                    header: "Substitution durchführen",
                    content: "Wir führen eine Hilfsvariable u ein. Wir setzen u = x². Damit wird aus x⁴ automatisch u². Die Gleichung wird dadurch quadratisch.",
                    formula: "u = x² \u2192 u² - 2u + 1 = 0",
                    merksatz: "u ersetzt x² im Nu – so schaust du der Lösung zu.",
                    color: "bg-emerald-50/50 border-emerald-100"
                },
                {
                    title: "3. Die quadratische Lösung",
                    header: "Einsatz der Mitternachtsformel",
                    content: "Löse die Gleichung für u mit der Mitternachtsformel. Da die Diskriminante Null ist, erhalten wir hier nur eine Lösung für u.",
                    formula: "u\u2081,\u2082 = 1",
                    merksatz: "Mitternacht bringt u ans Licht – vergiss das x dabei noch nicht!",
                    color: "bg-amber-50/50 border-amber-100"
                },
                {
                    title: "4. Die Rückverwandlung",
                    header: "Resubstitution & Wurzelziehen",
                    content: "Tausche u wieder gegen x² zurück. Um die endgültigen Nullstellen x zu finden, musst du die Wurzel aus u ziehen. Achtung: Plus-Minus beachten!",
                    formula: "x² = 1 \u2192 x\u2081,\u2082 = \u00B1\u221A1 = \u00B11",
                    merksatz: "Zieh die Wurzel aus dem u, dann fliegen dir die x-Werte zu.",
                    color: "bg-rose-50/50 border-rose-100"
                }
            ];

            return (
                <div className="max-w-4xl mx-auto p-6 md:p-12">
                    <header className="mb-10 text-center">
                        <span className="text-[10px] font-bold text-indigo-400 uppercase tracking-[0.2em] block mb-2">Mathematik didaktisch</span>
                        <h1 className="text-4xl font-bold text-slate-800 mb-2 tracking-tight">Substitution bei Grad 4</h1>
                        <p className="text-slate-400 font-medium italic">Strukturanalyse & Vielfachheit von Nullstellen</p>
                    </header>

                    <Graph showZeros={false} />

                    <div className="space-y-4 mb-12">
                        {steps.map((step, idx) => (
                            <div 
                                key={idx}
                                onClick={() => setActiveStep(idx)}
                                className={`p-6 rounded-3xl border transition-all cursor-pointer step-card ${activeStep === idx ? step.color + ' border-opacity-100 scale-[1.01] shadow-sm' : 'bg-white border-slate-100 opacity-50 hover:opacity-80'}`}
                            >
                                <div className="flex items-center justify-between mb-2">
                                    <h2 className="font-bold text-slate-800">{step.title}</h2>
                                    <div className={`w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold ${activeStep === idx ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-400'}`}>
                                        {idx + 1}
                                    </div>
                                </div>
                                <h3 className="text-xs font-semibold text-slate-400 uppercase mb-4 tracking-wider">{step.header}</h3>
                                
                                <div className="grid md:grid-cols-2 gap-6">
                                    <p className="text-sm text-slate-600 leading-relaxed">{step.content}</p>
                                    <div className="bg-white/60 p-4 rounded-2xl border border-slate-100 flex items-center justify-center text-center">
                                        <MathTerm>{step.formula}</MathTerm>
                                    </div>
                                </div>

                                {activeStep === idx && (
                                    <div className="mt-4 flex items-center gap-3 p-3 bg-white/40 rounded-xl italic text-xs text-slate-500 border border-white/50">
                                        <span className="text-indigo-400">●</span>
                                        <strong>Memo:</strong> {step.merksatz}
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>

                    <section className="bg-slate-900 p-8 rounded-[2.5rem] text-white modern-shadow relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-32 h-32 bg-indigo-500/10 rounded-full -mr-16 -mt-16 blur-2xl"></div>
                        <h2 className="text-xl font-bold mb-6 flex items-center gap-2">
                            <span className="w-2 h-2 bg-rose-400 rounded-full"></span>
                            Befund: Vielfachheit & Graphverlauf
                        </h2>

                        <div className="grid md:grid-cols-2 gap-10 items-center">
                            <div className="space-y-6">
                                <div className="space-y-3">
                                    <div className="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/10">
                                        <MathTerm><span className="text-white">x = -1</span></MathTerm>
                                        <span className="text-[10px] font-bold px-3 py-1 bg-rose-500/20 text-rose-300 rounded-full border border-rose-500/30 uppercase">Vielfachheit 2</span>
                                    </div>
                                    <div className="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/10">
                                        <MathTerm><span className="text-white">x = 1</span></MathTerm>
                                        <span className="text-[10px] font-bold px-3 py-1 bg-rose-500/20 text-rose-300 rounded-full border border-rose-500/30 uppercase">Vielfachheit 2</span>
                                    </div>
                                </div>

                                <div className="p-5 bg-indigo-500/5 rounded-2xl border border-indigo-500/10">
                                    <h4 className="text-sm font-bold text-indigo-300 mb-2 underline underline-offset-4 decoration-indigo-500/30">Hintergrund</h4>
                                    <p className="text-indigo-100/70 text-xs leading-relaxed italic">
                                        Da die quadratische Hilfsgleichung nur eine Lösung (<MathTerm><span className="text-white">u=1</span></MathTerm>) hat, verdoppelt sich die Vielfachheit der daraus resultierenden x-Werte. Der Graph <strong>berührt</strong> die x-Achse an diesen Stellen, ohne sie zu schneiden.
                                    </p>
                                </div>
                            </div>
                            <Graph showZeros={true} />
                        </div>
                    </section>

                    <footer className="mt-12 text-center">
                        <p className="text-[10px] font-bold text-slate-300 uppercase tracking-[0.3em]">
                            Mathematik-Modul • BS+ Bayern • Substitution Grad 4
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
